<!DOCTYPE html>
<html>
<head>
  <title>Photo App</title>
  <style>
    img { width: 200px; margin: 10px; }
    .photo-container { display: inline-block; text-align: center; margin: 10px; vertical-align: top; }
    .highlight { background-color: yellow; }
    .loading { font-style: italic; color: gray; }
    .tags-input { width: 180px; margin-top: 5px; }
    #drop-zone {
      width: 100%;
      padding: 30px;
      border: 2px dashed #888;
      text-align: center;
      margin-bottom: 20px;
      font-size: 16px;
      color: #555;
    }
    #drop-zone.dragover {
      border-color: #0b79d0;
      background-color: #e0f0ff;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>My Photo Gallery</h1>

  <div id="drop-zone">Drag & Drop Images Here or Click to Select</div>
  <input type="file" id="fileInput" multiple style="display:none;">
  <button onclick="triggerFileInput()">Upload Selected</button>

  <br><br>
  <input type="text" id="searchBox" placeholder="Search photos...">

  <div id="gallery"></div>

<script>
const images = [];
const baseUrl = "https://paulsphotostoragex.blob.core.windows.net/photos/";
const sasToken = "?sv=2024-11-04&ss=b&srt=o&sp=rwctfx&se=2026-04-08T22:21:18Z&st=2026-04-07T14:06:18Z&spr=https&sig=9J3egEjAEKMCFoFcGGeq1riu%2BnCSBa2ytRMuRJAMg48%3D";
const endpoint = "https://paulstestingai.cognitiveservices.azure.com/";
const key = "ElvasAtHuVAqguIiCFFu0lPO23m9TPFo574FSk3EhnPCBuWhBinsJQQJ99CDACmepeSXJ3w3AAAFACOGqW8v";

// Restore images
window.addEventListener("load", () => {
  const storedImages = JSON.parse(localStorage.getItem("images") || "[]");
  images.push(...storedImages);
  images.forEach(img => {
    if (!img.tagsArray || img.tagsArray.length === 0) {
      img.loading = true;
      analyzeImage(img.url).then(result => {
        img.tagsArray = result.tags ? result.tags.map(t => t.name.toLowerCase()) : [];
        img.loading = false;
        saveImages();
        renderGallery();
      }).catch(() => { img.loading = false; renderGallery(); });
    }
  });
  renderGallery();
});

// Trigger hidden file input
function triggerFileInput() {
  document.getElementById("fileInput").click();
}

// Handle file input selection
document.getElementById("fileInput").addEventListener("change", (e) => {
  uploadFiles(e.target.files);
});

// Drag & Drop handling
const dropZone = document.getElementById("drop-zone");

dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files.length > 0) {
    uploadFiles(e.dataTransfer.files);
  }
});

// Upload multiple files
function uploadFiles(files) {
  for (const file of files) {
    uploadSingleImage(file);
  }
}

// Upload single image
async function uploadSingleImage(file) {
  const fileName = Date.now() + "-" + file.name;
  const uploadUrl = baseUrl + fileName + sasToken;

  try {
    const response = await fetch(uploadUrl, {
      method: "PUT",
      headers: {
        "x-ms-blob-type": "BlockBlob",
        "Content-Type": file.type
      },
      body: file
    });
    if (!response.ok) throw new Error("Upload failed for " + file.name);

    const imageUrl = baseUrl + fileName;
    const imgObj = { url: imageUrl, tagsArray: [], loading: true };
    images.push(imgObj);
    renderGallery();

    analyzeImage(imageUrl).then(result => {
      imgObj.tagsArray = result.tags ? result.tags.map(t => t.name.toLowerCase()) : [];
      imgObj.loading = false;
      saveImages();
      renderGallery();
    }).catch(() => { imgObj.loading = false; renderGallery(); });

  } catch (err) {
    console.error(err);
  }
}

// AI analysis
async function analyzeImage(imageUrl) {
  const response = await fetch(endpoint + "vision/v3.2/analyze?visualFeatures=Tags", {
    method: "POST",
    headers: {
      "Ocp-Apim-Subscription-Key": key,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ url: imageUrl })
  });
  if (!response.ok) throw new Error("AI analysis failed");
  return await response.json();
}

// Save images
function saveImages() {
  localStorage.setItem("images", JSON.stringify(images));
}

// Render gallery
function renderGallery() {
  const query = document.getElementById("searchBox").value.toLowerCase().trim();
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  images.forEach((img) => {
    const match = img.loading || query === "" || img.tagsArray.some(tag => tag.includes(query));
    if (!match) return;

    const container = document.createElement("div");
    container.className = "photo-container";

    const imageEl = document.createElement("img");
    imageEl.src = img.url;

    const p = document.createElement("p");
    if (img.loading) {
      p.innerText = "Loading tags...";
      p.className = "loading";
    } else {
      const highlighted = img.tagsArray.map(tag =>
        query && tag.includes(query) ? `<span class="highlight">${tag}</span>` : tag
      );
      p.innerHTML = highlighted.join(", ");
    }

    const input = document.createElement("input");
    input.type = "text";
    input.value = img.tagsArray.join(", ");
    input.className = "tags-input";
    input.placeholder = "Edit tags, separate by comma";

    function saveInput() {
      img.tagsArray = input.value.split(",").map(t => t.trim().toLowerCase()).filter(t => t);
      saveImages();
      renderGallery();
    }

    input.addEventListener("change", saveInput);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        saveInput();
      }
    });

    container.appendChild(imageEl);
    container.appendChild(p);
    container.appendChild(input);
    gallery.appendChild(container);
  });
}

// Live search
document.getElementById("searchBox").addEventListener("input", renderGallery);
</script>
</body>
</html>

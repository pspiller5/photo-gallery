<!DOCTYPE html>
<html>
<head>
  <title>Photo Gallery App</title>
  <style>
    img { width: 200px; margin: 10px; }
    .photo-container { display: inline-block; text-align: center; margin: 10px; vertical-align: top; }
    .highlight { background-color: yellow; }
    .loading { font-style: italic; color: gray; }
    .tags-input { width: 180px; margin-top: 5px; }
    #drop-zone {
      width: 100%;
      padding: 30px;
      border: 2px dashed #888;
      text-align: center;
      margin-bottom: 20px;
      font-size: 16px;
      color: #555;
      cursor: pointer;
    }
    #drop-zone.dragover {
      border-color: #0b79d0;
      background-color: #e0f0ff;
      color: #000;
    }
  </style>
</head>
<body>
<h1>My Photo Gallery</h1>

<div id="drop-zone">Drag & Drop Images Here or Click to Select</div>
<input type="file" id="fileInput" multiple style="display:none;">
<button onclick="triggerFileInput()">Upload Selected</button>

<br><br>
<input type="text" id="searchBox" placeholder="Search photos...">
<div id="gallery"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// =================== CONFIG ===================

// ---- Azure Blob Storage ----
const baseUrl = "https://paulsphotostoragex.blob.core.windows.net/photos/";
const sasToken = "?sv=2025-11-05&ss=b&srt=co&sp=rwciytfx&se=3026-04-08T21:48:01Z&st=2026-04-08T13:33:01Z&spr=https&sig=mRhQx20NUyJ2EZj2%2FTk9g961ztQhxnMw8agNcl0GZKY%3D"; // <- Make sure this is all on one line

// ---- Azure AI Computer Vision ----
const endpoint = "https://paulstestingai.cognitiveservices.azure.com/";
const key = "ElvasAtHuVAqguIiCFFu0lPO23m9TPFo574FSk3EhnPCBuWhBinsJQQJ99CDACmepeSXJ3w3AAAFACOGqW8v";

// ---- Firebase ----
const firebaseConfig = {
  apiKey: "AIzaSyDIFlXxI8NKcmHtOA-jZ6ueP4GxbsxW9Qo",
  authDomain: "photogallery-8e34a.firebaseapp.com",
  projectId: "photogallery-8e34a",
  storageBucket: "photogallery-8e34a.firebasestorage.app",
  messagingSenderId: "824734545270",
  appId: "1:824734545270:web:55b091c79270a714edb657"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =================== VARIABLES ===================
let images = [];

// =================== LOAD IMAGES ===================
async function loadImages() {
  images = [];
  const snapshot = await db.collection("photos").get();
  snapshot.forEach(doc => images.push({ id: doc.id, ...doc.data(), loading: false, newlyUploaded: false }));
  renderGallery();
}

// =================== UPLOAD IMAGES ===================
function triggerFileInput() { document.getElementById("fileInput").click(); }
document.getElementById("fileInput").addEventListener("change", e => uploadFiles(e.target.files));

const dropZone = document.getElementById("drop-zone");
dropZone.addEventListener("click", triggerFileInput);
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("dragover"); uploadFiles(e.dataTransfer.files); });

function uploadFiles(files) {
  for (const file of files) uploadSingleImage(file);
}

async function uploadSingleImage(file) {
  const fileName = Date.now() + "-" + file.name;
  const uploadUrl = baseUrl + fileName + sasToken;

  const imgObj = { url: baseUrl + fileName, tagsArray: [], loading: true, newlyUploaded: true };
  images.push(imgObj);
  renderGallery();

  try {
    console.log("Uploading:", file.name);
    console.log("Upload URL:", uploadUrl);

    const response = await fetch(uploadUrl, {
      method: "PUT",
      headers: { "x-ms-blob-type": "BlockBlob", "Content-Type": file.type },
      body: file
    });

    console.log("Upload status:", response.status, "OK?", response.ok);
    if (!response.ok) throw new Error("Upload failed");

    const result = await analyzeImage(imgObj.url);
    imgObj.tagsArray = result.tags ? result.tags.map(t => t.name.toLowerCase()) : [];
    imgObj.loading = false;

    const docRef = await db.collection("photos").add({ url: imgObj.url, tagsArray: imgObj.tagsArray });
    imgObj.id = docRef.id;

    renderGallery();
  } catch(err) { console.error("Upload/AI error:", err); imgObj.loading = false; renderGallery(); }
}

// =================== AI ANALYSIS ===================
async function analyzeImage(url) {
  const response = await fetch(endpoint + "vision/v3.2/analyze?visualFeatures=Tags", {
    method: "POST",
    headers: { "Ocp-Apim-Subscription-Key": key, "Content-Type": "application/json" },
    body: JSON.stringify({ url })
  });
  if (!response.ok) throw new Error("AI analysis failed");
  return await response.json();
}

// =================== RENDER GALLERY ===================
function renderGallery() {
  const query = document.getElementById("searchBox").value.toLowerCase().trim();
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  images.forEach(img => {
    // Show if loading, newly uploaded, or search query matches a tag
    const match = img.loading || img.newlyUploaded || (query !== "" && img.tagsArray.some(tag => tag.includes(query)));
    if (!match) return;

    const container = document.createElement("div");
    container.className = "photo-container";

    const imageEl = document.createElement("img");
    imageEl.src = img.url;

    const p = document.createElement("p");
    if (img.loading) { p.innerText = "Loading tags..."; p.className = "loading"; }
    else {
      const highlighted = img.tagsArray.map(tag => query && tag.includes(query) ? `<span class="highlight">${tag}</span>` : tag);
      p.innerHTML = highlighted.join(", ");
    }

    const input = document.createElement("input");
    input.type = "text";
    input.value = img.tagsArray.join(", ");
    input.className = "tags-input";
    input.placeholder = "Edit tags, separate by comma";

    input.addEventListener("change", async () => { await saveTags(img, input.value); });
    input.addEventListener("keydown", async e => { if(e.key==="Enter"){ e.preventDefault(); await saveTags(img, input.value); } });

    container.appendChild(imageEl);
    container.appendChild(p);
    container.appendChild(input);
    gallery.appendChild(container);
  });
}

// =================== SAVE TAGS ===================
async function saveTags(img, value) {
  img.tagsArray = value.split(",").map(t=>t.trim().toLowerCase()).filter(t=>t);
  img.newlyUploaded = false; // remove flag after editing
  if(img.id) await db.collection("photos").doc(img.id).update({ tagsArray: img.tagsArray });
  renderGallery();
}

// =================== LIVE SEARCH ===================
document.getElementById("searchBox").addEventListener("input", renderGallery);

// =================== INITIAL LOAD ===================
loadImages();
</script>
</body>
</html>
